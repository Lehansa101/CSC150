<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Productivity Planner</title>

<style>
body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    background: radial-gradient(circle at top, #1e293b, #0b1220);
    color: #e5e7eb;
}

/* HEADER */
header {
    text-align: center;
    padding: 35px;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(148, 163, 184, 0.2);
}

h1 {
    margin: 0;
    font-size: 34px;
    letter-spacing: 1px;
    color: #38bdf8;
}

.small {
    font-size: 13px;
    color: #94a3b8;
}

/* MAIN CONTAINER */
.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

/* INPUT AREA */
.input-area {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

input, input[type="date"] {
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 14px;
    background: #111827;
    color: white;
    box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.2);
}

input:focus {
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
}

/* BUTTONS */
button {
    padding: 12px 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    font-weight: bold;
    cursor: pointer;
    color: #0b1220;
    transition: all 0.2s ease-in-out;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
}

/* TASK CARD */
.task {
    background: rgba(17, 24, 39, 0.8);
    border: 1px solid rgba(148, 163, 184, 0.15);
    padding: 14px;
    margin-top: 12px;
    border-radius: 14px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
}

.task:hover {
    transform: translateY(-2px);
}

/* TASK HEADER */
.task-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* STATUS BADGE */
.status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #1e293b;
    color: #94a3b8;
}

/* DATE */
.date {
    font-size: 12px;
    color: #93c5fd;
    margin-top: 5px;
}

/* PROGRESS BUTTONS */
.progress-buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.progress-buttons button {
    background: #1f2937;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 10px;
    color: #e5e7eb;
}

.progress-buttons button:hover {
    background: #334155;
}

/* DELETE BUTTON */
.delete {
    background: #ef4444 !important;
    color: white !important;
}

/* AI TIP BOX */
.card {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid rgba(56, 189, 248, 0.2);
    padding: 16px;
    border-radius: 14px;
    margin-top: 25px;
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
}

.card h3 {
    color: #38bdf8;
}
</style>

</head>

<body>

<header>
<h1>AI Productivity Planner</h1>
<p class="small">Organize tasks, track progress, and improve productivity with AI-style guidance</p>
</header>

<div class="container">

<div class="input-area">
<input type="text" id="taskInput" placeholder="Enter a task">
<input type="date" id="dateInput">
<button onclick="addTask()">Add Task</button>
</div>

<div id="taskList"></div>

<div class="card">
<h3>AI Productivity</h3>
<p class="small" id="aiTip">Add a task and the due date to start!</p>
</div>

</div>

<script>
function addTask() {
    const taskText = document.getElementById("taskInput").value;
    const dueDate = document.getElementById("dateInput").value;

    if (!taskText) return;

    const taskList = document.getElementById("taskList");

    const task = document.createElement("div");
    task.className = "task";

    task.innerHTML = `
        <div class="task-header">
            <span>${taskText}</span>
            <span class="status">Not Started</span>
        </div>

        <div class="date">
            Due: ${dueDate ? dueDate : "No date set"}
        </div>

        <div class="progress-buttons">
            <button onclick="setProgress(this, 'Not Started')">Not Started</button>
            <button onclick="setProgress(this, '25% Started')">25%</button>
            <button onclick="setProgress(this, '50% In Progress')">50%</button>
            <button onclick="setProgress(this, 'Done')">Done</button>
            <button class="delete" onclick="this.closest('.task').remove()">Delete</button>
        </div>
    `;

    taskList.appendChild(task);

    generateTip(taskText);

    document.getElementById("taskInput").value = "";
    document.getElementById("dateInput").value = "";
}

function setProgress(btn, status) {
    const task = btn.closest(".task");
    const statusBox = task.querySelector(".status");
    statusBox.innerText = status;

    if (status === "Done") {
        statusBox.style.color = "#22c55e";
    } else if (status.includes("50")) {
        statusBox.style.color = "#facc15";
    } else if (status.includes("25")) {
        statusBox.style.color = "#38bdf8";
    } else {
        statusBox.style.color = "#94a3b8";
    }
}

function generateTip(task) {
    let tip = "";

    if (task.toLowerCase().includes("study")) {
        tip = "Use 25-minute focus sessions to improve learning efficiency.";
    } else if (task.toLowerCase().includes("project")) {
        tip = "Break big projects into smaller milestones.";
    } else {
        tip = "Stay consistent — small progress daily leads to success.";
    }

    document.getElementById("aiTip").innerText = tip;
}
</script>

</body>
</html>
